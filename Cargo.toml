[package]
name = "tunaround"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
futures-util = "0.3"
redis = { version = "0.32", default-features = false, features = ["tokio-comp", "streams"] }

# PR CI: refactor/reviews 도그푸딩에서 도입. build + test + clippy를 리눅스에서 검증한다.
# 커버 피처 = "morphology mcp serve worker"(브랜치 검증 표준, 313 pass). semantic(Ollama 필요)·a2a-out(외부 크레이트)은 비커버.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # 이 레포 Windows rustc의 incremental 크래시 회피 습관을 CI에도 적용(리눅스에선 무해).
  CARGO_INCREMENTAL: 0

jobs:
  build-test-clippy:
    name: build · test · clippy (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, edition 2024)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --features "morphology mcp serve worker" --verbose

      - name: Test
        run: cargo test --features "morphology mcp serve worker" --verbose

      - name: Clippy (deny warnings)
        run: cargo clippy --features "morphology mcp serve worker" -- -D warnings

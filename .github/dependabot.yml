# Dependabot: SHA 핀한 GitHub Actions와 npm·cargo 의존성을 주간으로 갱신 PR을 연다(리뷰 #94/#99).
# 액션을 SHA로 핀하면 수동 갱신이 밀리므로, Dependabot이 새 SHA로 올리는 PR을 자동 생성해 CI로 검증한다.
version: 2
updates:
  # groups로 생태계별 업데이트를 한 PR로 묶는다(주간 개별 PR 폭주로 리뷰 피로 방지, gemini medium).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
    commit-message:
      prefix: 'ci'
    # release.yml은 cargo-dist autogenerated라 액션 버전도 dist 템플릿 소유 - dependabot이 올리면
    # plan 잡의 up-to-date 체크가 영구 실패한다(PR #109 실측, exit 255). github-actions 생태계는
    # per-file 제외가 없어 release.yml이 쓰는 first-party 3종을 의존성 단위로 ignore한다.
    # 대가: ci.yml의 checkout도 수동 범프로 전환(첫 수동 범프 = v7.0.0 SHA, PR #109 제안분 검증 후 반영).
    # setup-node·서드파티(dtolnay·Swatinem 등 공급망 민감)는 dependabot 관리 유지.
    ignore:
      - dependency-name: actions/checkout
      - dependency-name: actions/upload-artifact
      - dependency-name: actions/download-artifact

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend:
        patterns: ['*']
    commit-message:
      prefix: 'chore(frontend)'

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      cargo:
        patterns: ['*']
    commit-message:
      prefix: 'chore(deps)'

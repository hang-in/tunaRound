[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
# v0.1.0: aarch64 크로스(arm64-windows/arm64-linux)는 ring C 크로스컴파일 실패로 제외.
# 주 플랫폼(mac arm64·x64, windows x64, linux x64)만. arm64 크로스는 후속(zigbuild/xwin 조정).
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# A GitHub repo to push Homebrew formulas to
tap = "hang-in/homebrew-tap"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# 풀 기능 단일 바이너리: morphology·sqlite는 default, semantic·mcp·serve를 추가로 켠다.
features = ["semantic", "mcp", "serve"]
